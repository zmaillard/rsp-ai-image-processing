name: Destroy VM
on:
  workflow_dispatch:
    inputs:
      region:
        description: 'DigitalOcean region for the droplet'
        required: true
        default: 'nyc3'
      size:
        description: 'Droplet size'
        required: true
        default: 's-1vcpu-1gb'
jobs:
  destroy:
    runs-on: ubuntu-latest
    env:
      TF_VAR_digitalocean_token: ${{ secrets.DO_TOKEN }}
      TF_VAR_size: ${{ inputs.size }} 
      TF_VAR_region: ${{ inputs.region }} 
      AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }} 
      AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APPLICATION_KEY }} 
    steps:
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v3

      - name: Setup SSH key
        run: |
          echo "${{ secrets.PRIVATE_KEY }}" > ./terraform/ssh_key
          chmod 600 ./terraform/ssh_key

      - name: Terraform fmt
        run: terraform fmt -check
        continue-on-error: true
        working-directory: ./terraform

      - name: Terraform Init
        run: terraform init 
        working-directory: ./terraform

      - name: Terraform Validate
        run: terraform validate -no-color
        working-directory: ./terraform

      - name: Terraform Plan
        run: terraform plan -no-color 
        working-directory: ./terraform

      - name: Terraform Destroy
        run: terraform destroy  -auto-approve
        working-directory: ./terraform
